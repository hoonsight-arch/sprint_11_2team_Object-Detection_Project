<!DOCTYPE html>
<html>
<head>
<style>
/* Streamlit DOM 구조 시뮬레이션 */
body { background: #121212; color: #E0E0E0; font-family: sans-serif; padding: 20px; }

/* 케이스 1: Gemini 코드 그대로 - 수직 스택 */
.case1-image { width: 300px; height: 200px; background: linear-gradient(45deg, #333, #666); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.case1-glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px 24px 0 0;
    padding: 20px;
    margin-top: 10px;  /* 이미지 아래에 쌓임 → backdrop-filter 효과 없음 */
    width: 300px;
}

/* 케이스 2: negative margin 으로 진짜 겹침 */
.case2-wrapper { position: relative; width: 300px; }
.case2-image { width: 300px; height: 200px; background: linear-gradient(45deg, #2a6e4a, #1a3a8a); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.case2-glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px 24px 0 0;
    padding: 20px;
    margin-top: -80px;  /* ← 이미지 위로 당겨올림 → backdrop-filter 이미지에 적용됨 */
    position: relative;
    z-index: 10;
    width: 260px;
}
</style>
</head>
<body>
<h3>케이스 1: Gemini 코드 그대로 (수직 스택)</h3>
<p>glass card가 이미지 <b>아래</b>에 쌓임 → backdrop-filter가 어두운 배경만 블러</p>
<div class="case1-image">이미지 (Z-Index 0)</div>
<div class="case1-glass">glass card - 뒤에 이미지 없음, 배경(#121212)만 블러됨</div>

<br><br>
<h3>케이스 2: negative margin 추가 (진짜 겹침)</h3>
<p>glass card가 이미지 위로 <b>겹쳐짐</b> → backdrop-filter가 이미지를 실제로 블러</p>
<div class="case2-wrapper">
  <div class="case2-image">이미지 (Z-Index 0)</div>
  <div class="case2-glass">glass card - 이미지가 뒤로 투과되어 블러됨</div>
</div>
</body>
</html>
